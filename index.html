<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubEdit Pro | محرر الترجمة الاحترافي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@6.5.1/dist/framer-motion.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Cairo:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080810; --p1: #0e0e18; --p2: #12121e;
            --acc: #6366f1; --t0: #e4e4f4; --t1: #7878a0;
            --bd: rgba(255,255,255,0.06);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', 'Cairo', sans-serif; 
            background: var(--bg); color: var(--t0); 
            height: 100vh; overflow: hidden; font-size: 13px;
        }
        #root { height: 100%; display: flex; flex-direction: column; }
        .app-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar Styles */
        .sidebar { 
            width: 320px; background: var(--p1); 
            border-left: 1px solid var(--bd); 
            display: flex; flex-direction: column; 
        }
        .seg-card {
            background: var(--p2); border: 1px solid var(--bd);
            border-radius: 8px; padding: 10px; margin-bottom: 8px;
            cursor: pointer; transition: 0.2s;
        }
        .seg-card.active { border-color: var(--acc); box-shadow: 0 0 10px rgba(99,102,241,0.2); }
        
        /* Video Area */
        .main-view { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        .video-wrapper { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        video, canvas { position: absolute; max-width: 100%; max-height: 100%; }
        
        /* Controls */
        .toolbar { 
            height: 50px; background: var(--p1); 
            border-top: 1px solid var(--bd); 
            display: flex; align-items: center; padding: 0 20px; gap: 15px;
        }
        button {
            background: var(--acc); color: white; border: none;
            padding: 6px 12px; border-radius: 4px; cursor: pointer;
            font-weight: bold; font-family: inherit;
        }
        input[type="text"] {
            background: rgba(0,0,0,0.3); border: 1px solid var(--bd);
            color: white; padding: 5px; border-radius: 4px; width: 100%;
        }
        .time-label { font-family: 'JetBrains Mono'; color: var(--t1); font-size: 11px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // --- Constants & Utils ---
        const FPS = 30;
        const DEFAULT_STYLE = {
            font: 'Cairo', size: 50, colorAr: '#FFFFFF', colorEn: '#FFFFFF',
            strokeOn: true, strokeColor: '#000000', strokeW: 2,
            posY: -400, fadeIn: 200, fadeOut: 200
        };

        const msToSRT = (ms) => {
            const date = new Date(ms);
            const h = String(Math.floor(ms / 3600000)).padStart(2, '0');
            const m = String(date.getUTCMinutes()).padStart(2, '0');
            const s = String(date.getUTCSeconds()).padStart(2, '0');
            const mm = String(date.getUTCMilliseconds()).padStart(3, '0');
            return `${h}:${m}:${s},${mm}`;
        };

        // --- Main App Component ---
        const App = () => {
            const [segments, setSegments] = useState([]);
            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [mediaUrl, setMediaUrl] = useState(null);
            const [selectedId, setSelectedId] = useState(null);
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);

            // إضافة مقطع جديد
            const addSegment = () => {
                const newSeg = {
                    id: Date.now(),
                    start: currentTime,
                    dur: 3000,
                    textAr: 'نص جديد',
                    textEn: 'New Subtitle'
                };
                setSegments([...segments, newSeg].sort((a,b) => a.start - b.start));
                setSelectedId(newSeg.id);
            };

            // رسم الترجمة على الـ Canvas
            const draw = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const activeSegs = segments.filter(s => currentTime >= s.start && currentTime <= (s.start + s.dur));
                
                activeSegs.forEach(seg => {
                    const opacity = 1; // يمكن إضافة فكرة الـ Fade هنا
                    ctx.font = `${DEFAULT_STYLE.size}px Cairo`;
                    ctx.textAlign = 'center';
                    ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                    
                    // رسم النص العربي
                    ctx.fillText(seg.textAr, canvas.width / 2, canvas.height + (DEFAULT_STYLE.posY / 1080 * canvas.height));
                    // رسم النص الإنجليزي أسفله
                    ctx.font = `${DEFAULT_STYLE.size * 0.7}px Inter`;
                    ctx.fillText(seg.textEn, canvas.width / 2, canvas.height + (DEFAULT_STYLE.posY / 1080 * canvas.height) + 50);
                });
            }, [segments, currentTime]);

            useEffect(() => {
                const interval = setInterval(() => {
                    if (videoRef.current && !videoRef.current.paused) {
                        setCurrentTime(videoRef.current.currentTime * 1000);
                        draw();
                    }
                }, 1000 / FPS);
                return () => clearInterval(interval);
            }, [draw]);

            // تصدير الملفات
            const exportSRT = () => {
                const content = segments.map((s, i) => 
                    `${i+1}\n${msToSRT(s.start)} --> ${msToSRT(s.start + s.dur)}\n${s.textAr}\n${s.textEn}\n`
                ).join('\n');
                const blob = new Blob([content], { type: 'text/srt' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'subtitles.srt'; a.click();
            };

            return (
                <div id="root">
                    <div className="toolbar">
                        <h2 style={{fontSize: '16px', color: 'var(--acc)'}}>SubEdit Pro</h2>
                        <button onClick={() => document.getElementById('file-upload').click()}>تحميل فيديو</button>
                        <input id="file-upload" type="file" hidden onChange={(e) => setMediaUrl(URL.createObjectURL(e.target.files[0]))} />
                        <button onClick={addSegment}>+ إضافة ترجمة</button>
                        <button onClick={exportSRT} style={{background: '#22c55e'}}>تصدير SRT</button>
                        <div className="time-label">Time: {Math.floor(currentTime/1000)}s / {Math.floor(duration/1000)}s</div>
                    </div>

                    <div className="app-container">
                        <div className="main-view">
                            <div className="video-wrapper">
                                {mediaUrl && (
                                    <video 
                                        ref={videoRef} 
                                        src={mediaUrl} 
                                        onLoadedMetadata={() => setDuration(videoRef.current.duration * 1000)}
                                        onClick={() => videoRef.current.paused ? videoRef.current.play() : videoRef.current.pause()}
                                    />
                                )}
                                <canvas ref={canvasRef} width="1920" height="1080" />
                            </div>
                        </div>

                        <div className="sidebar">
                            <div style={{padding: '10px', borderBottom: '1px solid var(--bd)'}}>قائمة المقاطع</div>
                            <div style={{flex: 1, overflowY: 'auto', padding: '10px'}}>
                                {segments.map(seg => (
                                    <div key={seg.id} className={`seg-card ${selectedId === seg.id ? 'active' : ''}`} onClick={() => setSelectedId(seg.id)}>
                                        <div style={{fontSize: '10px', marginBottom: '5px'}}>{msToSRT(seg.start)}</div>
                                        <input type="text" value={seg.textAr} onChange={(e) => {
                                            const newSegs = segments.map(s => s.id === seg.id ? {...s, textAr: e.target.value} : s);
                                            setSegments(newSegs);
                                        }} style={{marginBottom: '5px', direction: 'rtl'}} />
                                        <input type="text" value={seg.textEn} onChange={(e) => {
                                            const newSegs = segments.map(s => s.id === seg.id ? {...s, textEn: e.target.value} : s);
                                            setSegments(newSegs);
                                        }} />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
